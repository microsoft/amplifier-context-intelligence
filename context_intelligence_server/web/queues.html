<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queues &middot; Context Intelligence</title>
  <link rel="icon" href="https://avatars.githubusercontent.com/u/240397093" />
  <link rel="stylesheet" href="/static/css/theme.css" />
  <script src="/static/js/theme.js"></script>
</head>
<body>
  <div class="glow-top-left"></div>
  <div class="glow-bottom-right"></div>

  <div class="page">
    <!-- Auth overlay -->
    <div id="auth-overlay" style="position:fixed;inset:0;z-index:9999;background:var(--background);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;">
      <img src="https://avatars.githubusercontent.com/u/240397093" alt="Amplifier" style="width:64px;height:64px;border-radius:50%;" />
      <h2 style="margin:0;font-size:1.25rem;">Context Intelligence</h2>
      <p style="margin:0;color:var(--muted-foreground);">Enter your API key</p>
      <input id="auth-token-input" type="password" placeholder="API key&hellip;" style="padding:0.5rem 0.75rem;border:1px solid var(--border);border-radius:0.375rem;background:var(--input);color:var(--foreground);font-size:1rem;width:20rem;max-width:90vw;" />
      <button id="auth-submit-btn" style="padding:0.5rem 1.5rem;background:var(--primary);color:var(--primary-foreground);border:none;border-radius:0.375rem;cursor:pointer;font-size:1rem;">Unlock</button>
      <p id="auth-error" style="margin:0;color:var(--destructive);display:none;">Invalid API key. Please try again.</p>
    </div>

    <!-- Nav -->
    <nav class="topnav">
      <div class="brand">
        <img src="https://avatars.githubusercontent.com/u/240397093" alt="Amplifier" />
        <span class="brand-name">Context Intelligence</span>
      </div>
      <a href="/">Home</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/queues" class="active">Queues</a>
      <a href="/docs" target="_blank">API</a>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">&#x263E;</button>
    </nav>

    <!-- Pipeline conservation -->
    <p class="section-label">Pipeline conservation</p>
    <div class="card invariant" id="invariant-card" role="status" aria-live="polite" aria-label="Pipeline balanced">
      <span class="invariant-legend">accepted &minus; written &minus; in queue &minus; dead letter =</span>
      <div class="invariant-row">
        <span class="invariant-eq" id="invariant-eq" aria-hidden="true">&mdash;</span>
        <span class="badge badge-primary" id="invariant-badge">&mdash;</span>
      </div>
    </div>

    <!-- Pipeline totals -->
    <p class="section-label">Pipeline totals</p>
    <div id="totals-row" style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.5rem;"></div>

    <!-- Dead-letter queues -->
    <p class="section-label">Dead-letter queues</p>
    <div class="card" style="padding:0;overflow:hidden;">
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr>
            <th scope="col">Worker</th>
            <th scope="col">Items</th>
            <th scope="col">Last error</th>
            <th scope="col">Last seen</th>
            <th scope="col">Actions</th>
          </tr></thead>
          <tbody id="dead-letter-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="/static/js/queues.js"></script>
  <script>
    // set correct icon after theme.js runs
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = document.documentElement.classList.contains('dark') ? '\u2600' : '\u263e';
  </script>
  <script>
    // ── Auth gate ───────────────────────────────────────────────────────────
    (function () {
      const overlay = document.getElementById('auth-overlay');
      const input   = document.getElementById('auth-token-input');
      const submit  = document.getElementById('auth-submit-btn');
      const errMsg  = document.getElementById('auth-error');

      // If token already stored, hide overlay immediately
      if (localStorage.getItem('ci_api_key')) {
        overlay.style.display = 'none';
      }

      async function tryAuth() {
        const token = input.value.trim();
        if (!token) return;
        errMsg.style.display = 'none';
        try {
          const res = await fetch('/cypher', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + token,
            },
            body: JSON.stringify({ query: 'RETURN 1', params: {}, workspace: '*' }),
          });
          if (res.status === 401) {
            errMsg.style.display = '';
            return;
          }
          // 200 or any non-401: accept token
          localStorage.setItem('ci_api_key', token);
          overlay.style.display = 'none';
        } catch (_networkErr) {
          // Network error (server may be starting) — store token anyway
          localStorage.setItem('ci_api_key', token);
          overlay.style.display = 'none';
        }
      }

      submit.addEventListener('click', tryAuth);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') tryAuth();
      });
    })();
  </script>
</body>
</html>
