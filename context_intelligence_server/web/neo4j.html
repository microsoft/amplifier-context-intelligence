<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo4j &middot; Context Intelligence</title>
  <link rel="icon" href="https://avatars.githubusercontent.com/u/240397093" />
  <link rel="stylesheet" href="/static/css/theme.css" />
  <script src="/static/js/theme.js"></script>
  <style>
    html, body { height: 100dvh; overflow: hidden; margin: 0; }
    body { display: flex; flex-direction: column; background: var(--background); }
    .nav-wrap { padding: 0.5rem 1.5rem; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .nav-wrap .topnav { margin-bottom: 0; }
    .embed-frame { flex: 1; border: none; width: 100%; min-height: 0; display: block; }
  </style>
</head>
<body>
  <div class="nav-wrap">
    <nav class="topnav">
      <div class="brand">
        <img src="https://avatars.githubusercontent.com/u/240397093" alt="Amplifier" />
        <span class="brand-name">Context Intelligence</span>
      </div>
      <a href="/">Home</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/docs" target="_blank">API</a>
      <a href="/explorer">Explorer</a>
      <a href="/neo4j" class="active">Neo4j</a>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">&#x263E;</button>
    </nav>
  </div>

  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:2rem;">
    <div style="max-width:480px; text-align:center; color:var(--foreground);">
      <div style="font-size:3rem; margin-bottom:1rem;">&#x25C8;</div>
      <h2 style="margin:0 0 0.75rem; font-family:var(--font-sans,'Outfit',system-ui,sans-serif); font-weight:600;">Neo4j Browser</h2>
      <p style="color:var(--muted-foreground); line-height:1.6; margin:0 0 1.5rem;">
        Query the session property graph directly with Cypher.
        Neo4j Browser runs on its own origin and cannot be embedded.
      </p>
      <div style="display:flex; flex-direction:column; gap:0.75rem; align-items:center;">
        <a href="http://localhost:7474/browser/" target="_blank"
           style="display:inline-block; padding:0.6rem 1.5rem; background:var(--primary); color:var(--primary-foreground,#fff); border-radius:8px; text-decoration:none; font-weight:500; font-family:var(--font-sans,'Outfit',system-ui,sans-serif); transition:opacity 0.15s;">
          Open Neo4j Browser &rarr;
        </a>
        <p style="color:var(--muted-foreground); font-size:0.8rem; margin:0;">
          Bolt: <code style="font-family:var(--font-mono,'JetBrains Mono',monospace); background:var(--muted); padding:2px 6px; border-radius:4px;">bolt://localhost:7687</code>
          &nbsp;&middot;&nbsp; Auth: <code style="font-family:var(--font-mono,'JetBrains Mono',monospace); background:var(--muted); padding:2px 6px; border-radius:4px;">none</code>
        </p>
      </div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = document.documentElement.classList.contains('dark') ? '\u2600' : '\u263e';
  </script>
</body>
</html>
