# Air-gapped APOC validation — Digital Twin Universe (Incus) profile.
#
# Deeper isolation than the Docker-only test/airgap/verify-airgap-apoc.sh: this
# stands up a fresh Incus container, installs Docker inside it, builds the
# air-tight Neo4j image from this repo's neo4j.Dockerfile (which bakes the APOC
# Core jar at BUILD time from the official image's bundled
# /var/lib/neo4j/labs/apoc-*-core.jar (version matches the image) -- no external
# plugin download), then runs
# that image on a Docker *internal* network (no NAT / no egress) and verifies
# APOC loads with the Neo4j container cut off from the internet.
#
# Provisioning itself IS the validation: if APOC does not load offline, the
# final setup step fails and the launch fails.
#
# Launch (paths in `provision.files.src` resolve relative to THIS file, so run
# from anywhere):
#   amplifier-digital-twin up test/airgap/dtu-profile.yaml
#   amplifier-digital-twin destroy neo4j-apoc-airgap-validate   # when done
#
# Build-time internet is used ONLY to pull the base neo4j image + install Docker
# inside the twin; the air-gap requirement applies to the Neo4j container at RUN
# time, which is what is enforced and verified here.
name: neo4j-apoc-airgap-validate
description: >
  Isolated Docker-in-Incus environment that builds the air-tight Neo4j+APOC
  image and proves APOC loads with zero internet egress at runtime.

base:
  image: ubuntu:24.04

provision:
  files:
    # Resolved relative to this profile's directory (test/airgap/) -> repo root.
    - src: ../../neo4j.Dockerfile
      dest: /root/neo4j-build/neo4j.Dockerfile

  setup_cmds:
    - apt-get update && apt-get install -y ca-certificates curl gnupg lsb-release

    # Install Docker Engine
    - |
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
        -o /etc/apt/keyrings/docker.asc
      chmod a+r /etc/apt/keyrings/docker.asc
      echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
        https://download.docker.com/linux/ubuntu \
        $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
        | tee /etc/apt/sources.list.d/docker.list > /dev/null
      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io

    # Avoid Docker FORWARD-DROP breaking outbound during the base-image pull.
    - |
      echo '{"ip-forward-no-drop": true}' > /etc/docker/daemon.json

    # Start Docker daemon (no systemd inside Incus).
    - |
      dockerd &>/var/log/dockerd.log &
      for i in $(seq 1 30); do
        docker info &>/dev/null && break
        sleep 1
      done
      docker info &>/dev/null || { echo "Docker failed to start"; cat /var/log/dockerd.log; exit 1; }

    # Build the air-tight image (pulls base neo4j, bakes APOC jar at build time).
    - |
      docker build -f /root/neo4j-build/neo4j.Dockerfile \
        -t neo4j-apoc-airgap:2026.05.0 /root/neo4j-build
      docker image inspect neo4j-apoc-airgap:2026.05.0 >/dev/null \
        || { echo "image build failed"; exit 1; }

    # AIR-GAP RUN + VERIFY: run the baked image on an INTERNAL docker network
    # (no NAT, no internet egress) and prove APOC loads without any download.
    - |
      set -e
      docker network create --internal apoc-airgap-net
      docker run -d --name neo4j-airgap --network apoc-airgap-net \
        -e NEO4J_AUTH=neo4j/airgaptestpw neo4j-apoc-airgap:2026.05.0
      echo "waiting for Neo4j to start (air-gapped)..."
      for i in $(seq 1 30); do
        docker logs neo4j-airgap 2>&1 | grep -q "Started." && break
        sleep 2
      done
      docker logs neo4j-airgap 2>&1 | grep -q "Started." \
        || { echo "neo4j did not start"; docker logs neo4j-airgap; exit 1; }
      # Prove no egress from inside the container.
      if docker exec neo4j-airgap bash -c 'timeout 5 bash -c "cat </dev/null >/dev/tcp/8.8.8.8/53" 2>/dev/null'; then
        echo "FAIL: container reached the internet — not air-gapped"; exit 1
      fi
      echo "egress to 8.8.8.8:53 blocked (air-gapped)."
      # APOC must load from the baked jar.
      VER=$(docker exec neo4j-airgap cypher-shell -u neo4j -p airgaptestpw --format plain \
        "RETURN apoc.version();" | tr -d '"[:space:]' | tail -1)
      echo "apoc.version() = ${VER}"
      [ "${VER}" = "2026.05.0" ] || { echo "FAIL: apoc.version mismatch"; exit 1; }
      # Built-in db.* must still work (allowlist not over-restricted).
      docker exec neo4j-airgap cypher-shell -u neo4j -p airgaptestpw --format plain \
        "CALL db.labels() YIELD label RETURN count(label);" >/dev/null \
        || { echo "FAIL: built-in db.labels blocked"; exit 1; }
      echo "AIR-GAP APOC VALIDATION: PASS"

readiness:
  - name: docker-ready
    command: "docker info >/dev/null 2>&1"
  - name: airgap-image-built
    command: "docker image inspect neo4j-apoc-airgap:2026.05.0 >/dev/null 2>&1"
  - name: apoc-verified-airgapped
    command: "docker exec neo4j-airgap cypher-shell -u neo4j -p airgaptestpw 'RETURN apoc.version();' 2>/dev/null | grep -q 2026.05.0"
