# Context Intelligence Server — configuration file
#
# Copy this file to server-config.yaml and edit as needed.
# The server looks for server-config.yaml in the working directory, or you can
# point it at any path via:
#
#   AMPLIFIER_CONTEXT_INTELLIGENCE_SERVER_CONFIG_FILE=/path/to/your-config.yaml
#
# Environment variables always override values set here.
# All fields are optional — omitted fields fall back to their built-in defaults.
#
# -----------------------------------------------------------------------------
# Neo4j connection
# neo4j_url is the bolt/neo4j driver URL used for all graph operations.
# It is also advertised in the web UI (home page Neo4j card and dashboard
# "Neo4j URL" chip) so operators can see at a glance which database the
# server is connected to.
# -----------------------------------------------------------------------------
neo4j_url: bolt://localhost:7687           # bolt driver URL — use bolt:// for Community Edition single-node
neo4j_browser_url: http://localhost:7474  # Neo4j HTTP browser UI — displayed as a clickable link in the web UI
neo4j_user: neo4j
neo4j_password: ""          # Empty only for local Neo4j with NEO4J_AUTH=none (dev only).
                             # Docker and production deployments always use a password.
                             # Run: context-intelligence-server init  --neo4j-url bolt://localhost:7687  --neo4j-user neo4j

# -----------------------------------------------------------------------------
# Authentication
# Generate with: context-intelligence-server init
# When set, all API endpoints (except /status) require:
#   Authorization: Bearer <api_key>
# When absent or empty, no authentication is required (local dev only).
# -----------------------------------------------------------------------------
api_key: ""                 # Empty or absent = auth disabled (local dev). Set to a non-empty secret to enable auth.

# -----------------------------------------------------------------------------
# Storage paths
# All three directories are created automatically on first start.
# -----------------------------------------------------------------------------
blob_path: ~/amplifier-context-intelligence-server-data-store/blobs
log_path:  ~/amplifier-context-intelligence-server-data-store/logs/server.jsonl

# Durable ingest queue (persist-then-202): each session gets an append-log under
# queues_path so events survive a crash between the 202 ACK and the Neo4j write.
queues_path: /data/queues          # Durable per-session append-logs; mirrors blob_path
write_concurrency: 8               # Max concurrent Neo4j write flushes across all session drainers (starvation guard)
max_delivery_attempts: 5           # Flush retries for one batch before its offending line is dead-lettered

# -----------------------------------------------------------------------------
# Server bind address
# These two values are combined into the HTTP URL advertised in the web UI
# (home page "Server URL" chip and dashboard "Server URL" chip).
# Example: server_host=0.0.0.0 + server_port=8000 → http://0.0.0.0:8000
#
# Use 0.0.0.0 (the default) to accept connections from all interfaces,
# including Docker container bridges and Incus container bridges.
# This is required when worker containers need to dispatch events to a server
# running on the host — they cannot reach 127.0.0.1 (host loopback) from
# inside a container.
#
# Security: 0.0.0.0 exposes the server on all network interfaces, including
# your LAN IP. On a single-user dev machine behind a router or firewall this
# is acceptable. If you deploy this server where port 8000 is reachable from
# the public internet, add a firewall rule to restrict access to trusted IPs.
# Use 127.0.0.1 only if you are certain no containers need to reach the server.
# -----------------------------------------------------------------------------
server_host: 0.0.0.0        # Bind to all interfaces (required for container bridge access)
server_port: 8000

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
log_level: INFO              # DEBUG | INFO | WARNING | ERROR

# -----------------------------------------------------------------------------
# Session lifecycle timeouts (seconds)
# -----------------------------------------------------------------------------
dashboard_inactive_timeout: 1800.0    # 30 min  — hide session from dashboard
stale_session_timeout: 432000.0       # 5 days  — reap idle session worker
