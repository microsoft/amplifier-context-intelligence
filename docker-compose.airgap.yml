# Air-gapped / offline override for the Neo4j service.
#
# Use this when the Neo4j container has no internet egress and you want the APOC
# Core plugin baked into an immutable image layer instead of installed by the
# Neo4j startup plugin-installer. See neo4j.Dockerfile for the rationale.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.airgap.yml up -d --build
#
# On a fully disconnected host, also pre-load the base image first (on a
# connected machine: `docker save neo4j:2026.05.0-community -o neo4j.tar`; on the
# air-gapped host: `docker load -i neo4j.tar`) or pull it from an internal
# registry mirror. Everything else then runs offline.
services:
  neo4j:
    build:
      context: .
      dockerfile: neo4j.Dockerfile
    image: amplifier-context-intelligence-neo4j-apoc:2026.05.0
    environment:
      # APOC jar is baked into the image and its security config is set in the
      # Dockerfile. Disable the NEO4J_PLUGINS installer so nothing attempts to
      # resolve or copy plugins at startup (fully air-tight, no network path).
      NEO4J_PLUGINS: ""
