services:
  context-intelligence-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVER_NEO4J_URL: neo4j://neo4j:7687
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVER_BLOB_PATH: /data/blobs
      PYTHONUNBUFFERED: "1"
    volumes:
      - blob_data:/data/blobs
      - log_data:/data/logs
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    labels:
      com.context-intelligence.component: server
    networks:
      - context-intelligence

  intelligence-service:
    build:
      context: ..
      dockerfile: amplifier-context-intelligence/Dockerfile.intelligence
    ports:
      - "8100:8100"
    depends_on:
      context-intelligence-server:
        condition: service_healthy
    volumes:
      - intelligence_runtime_state:/data/intelligence-runtime
      - blob_data:/data/blobs:ro
    env_file:
      - config/secrets.env
    environment:
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVICE_RUNTIME_STATE_PATH: /data/intelligence-runtime
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVICE_ROUTING_MATRIX: balanced
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVICE_INGESTION_URL: http://context-intelligence-server:8000
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVER_URL: http://context-intelligence-server:8000
      AMPLIFIER_CONTEXT_INTELLIGENCE_WORKSPACE: intelligence-runtime
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 180s
    restart: unless-stopped
    labels:
      com.context-intelligence.component: intelligence-service
    networks:
      - context-intelligence

  frontend:
    build:
      context: ..
      dockerfile: amplifier-context-intelligence/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      intelligence-service:
        condition: service_healthy
    restart: unless-stopped
    labels:
      com.context-intelligence.component: frontend
    networks:
      - context-intelligence

  neo4j:
    image: neo4j:5.26.22-community
    environment:
      NEO4J_AUTH: none
    ports:
      - "7474:7474"  # browser UI — debug/diagnostics
      - "7687:7687"  # bolt — exposed for Neo4j browser and direct queries
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    labels:
      com.context-intelligence.component: neo4j
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - context-intelligence

volumes:
  blob_data:
  neo4j_data:
  log_data:
  intelligence_runtime_state:

networks:
  context-intelligence:
    driver: bridge
