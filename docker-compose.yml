services:
  context-intelligence-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      CI_SERVER_NEO4J_URL: neo4j://neo4j:7687
      CI_SERVER_BLOB_PATH: /data/blobs
    volumes:
      - blob_data:/data/blobs
    depends_on:
      - neo4j
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
    volumes:
      - neo4j_data:/data

volumes:
  blob_data:
  neo4j_data:
