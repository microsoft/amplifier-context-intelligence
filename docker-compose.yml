services:
  context-intelligence-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVER_NEO4J_URL: bolt://neo4j:7687
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVER_BLOB_PATH: /data/blobs
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVER_CONFIG_FILE: /data/credentials.yaml
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${HOME}/amplifier-context-intelligence-server-data-store:/data
      - ${HOME}/amplifier-context-intelligence-server-data-store/blobs:/data/blobs
      - ${HOME}/amplifier-context-intelligence-server-data-store/logs:/data/logs
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    labels:
      com.context-intelligence.component: server
    networks:
      - context-intelligence

  neo4j:
    image: neo4j:5.26.22-community
    env_file:
      - ${HOME}/amplifier-context-intelligence-server-data-store/neo4j-auth.env
    environment:
      NEO4J_db_memory_transaction_max: "512m"
      # Fail-loud guarantee: a finite lock-acquisition timeout. With the Neo4j
      # default of 0s a flush that cannot acquire a node lock blocks FOREVER and
      # silently (the v4.0.1 drain-stall incident). A finite bound makes a stuck
      # flush raise a TransientError, which the managed-tx retry + drain loop
      # surface LOUDLY (ERROR log, dead-letter, /status degraded) instead of
      # hanging. It also bounds starvation: a blocked flush releases its write
      # slot within this window rather than holding it indefinitely. 30s default
      # (tunable); see verify/results/green-failloud.md.
      NEO4J_db_lock_acquisition_timeout: "30s"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ${HOME}/amplifier-context-intelligence-server-data-store/neo4j:/data
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    labels:
      com.context-intelligence.component: neo4j
    networks:
      - context-intelligence

networks:
  context-intelligence:
    driver: bridge
