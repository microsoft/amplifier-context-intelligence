# ---------------------------------------------------------------------------
# FIRST RUN: run ./start.sh — do NOT run `docker compose up` directly yet.
#
# start.sh generates the credentials this stack needs
# (credentials.yaml + neo4j-auth.env) under
# $HOME/amplifier-context-intelligence-server-data-store/, then brings the
# stack up. The neo4j service reads its password from that generated
# neo4j-auth.env via `env_file:` below — on a fresh checkout it does not exist
# yet, so a bare `docker compose up` fails with:
#
#     env file .../neo4j-auth.env not found
#
# That error means you skipped the first-run step. Run ./start.sh once;
# afterwards the credentials persist and `docker compose up -d` works directly.
#
# See README.md → "Running with Docker Compose".
# ---------------------------------------------------------------------------
services:
  context-intelligence-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVER_NEO4J_URL: bolt://neo4j:7687
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVER_BLOB_PATH: /data/blobs
      AMPLIFIER_CONTEXT_INTELLIGENCE_SERVER_CONFIG_FILE: /data/credentials.yaml
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${HOME}/amplifier-context-intelligence-server-data-store:/data
      - ${HOME}/amplifier-context-intelligence-server-data-store/blobs:/data/blobs
      - ${HOME}/amplifier-context-intelligence-server-data-store/logs:/data/logs
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    labels:
      com.context-intelligence.component: server
    networks:
      - context-intelligence

  neo4j:
    image: neo4j:5.26.22-community
    env_file:
      - ${HOME}/amplifier-context-intelligence-server-data-store/neo4j-auth.env
    environment:
      NEO4J_db_memory_transaction_max: "512m"
      # APOC plugin. Neo4j 5.x auto-installs the bundled apoc-core jar from
      # /var/lib/neo4j/labs into /var/lib/neo4j/plugins at startup and applies
      # APOC's default config (incl. unrestricted apoc.*). No volume mount or
      # manual jar download is required; it re-installs on every container start.
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ${HOME}/amplifier-context-intelligence-server-data-store/neo4j:/data
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    labels:
      com.context-intelligence.component: neo4j
    networks:
      - context-intelligence

networks:
  context-intelligence:
    driver: bridge
